<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0e0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daftar" />
  <title>Daftar</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-icon">📖</div>
      <h1 class="splash-title">Daftar</h1>
      <p class="splash-sub">Shaxsiy kundaligingiz</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <!-- TOP NAV -->
    <header class="topbar">
      <button id="btn-back" class="btn-icon hidden" onclick="goBack()">←</button>
      <h1 id="topbar-title">Daftar</h1>
      <button id="btn-search-open" class="btn-icon" onclick="openScreen('search')">🔍</button>
    </header>

    <!-- HOME SCREEN -->
    <section id="screen-home" class="screen active">
      <div class="home-greeting" id="greeting-text"></div>
      <div class="category-scroll" id="category-pills">
        <button class="pill active" data-cat="all" onclick="filterByCategory('all', this)">Barchasi</button>
      </div>
      <div class="entries-list" id="entries-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🌙</div>
          <p>Hali yozuv yo'q.<br/>Birinchi kundalikni yozing!</p>
        </div>
      </div>
    </section>

    <!-- WRITE / EDIT SCREEN -->
    <section id="screen-write" class="screen">
      <div class="write-wrap">
        <div class="write-meta">
          <span id="write-date" class="write-date-label"></span>
          <select id="write-category" class="cat-select">
            <option value="">Kategoriyasiz</option>
          </select>
        </div>
        <input id="write-title" class="write-title-input" placeholder="Sarlavha..." maxlength="80" />
        <textarea id="write-body" class="write-body-input" placeholder="Bugun nima bo'ldi..."></textarea>
        <div class="reminder-row">
          <span class="reminder-label">⏰ Eslatma:</span>
          <input type="time" id="write-reminder" class="reminder-time" />
          <button class="btn-reminder-set" onclick="setReminder()">O'rnatish</button>
        </div>
        <div class="write-actions">
          <button class="btn-delete-entry hidden" id="btn-delete-entry" onclick="deleteCurrentEntry()">🗑 O'chirish</button>
          <button class="btn-save" onclick="saveEntry()">Saqlash ✓</button>
        </div>
      </div>
    </section>

    <!-- CATEGORIES SCREEN -->
    <section id="screen-categories" class="screen">
      <div class="cat-screen-wrap">
        <div class="cat-add-row">
          <input id="new-cat-input" class="cat-input" placeholder="Yangi kategoriya nomi..." maxlength="30" />
          <button class="btn-add-cat" onclick="addCategory()">+ Qo'shish</button>
        </div>
        <div id="cat-list" class="cat-list"></div>
      </div>
    </section>

    <!-- SEARCH SCREEN -->
    <section id="screen-search" class="screen">
      <div class="search-wrap">
        <input id="search-input" class="search-input" placeholder="Qidirish..." oninput="doSearch()" />
        <div id="search-results" class="search-results">
          <div class="empty-state">
            <div class="empty-icon">🔎</div>
            <p>Qidirish uchun yozing...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="nav-home" onclick="openScreen('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Bosh</span>
      </button>
      <button class="nav-btn fab" onclick="newEntry()">
        <span class="fab-plus">+</span>
      </button>
      <button class="nav-btn" id="nav-categories" onclick="openScreen('categories')">
        <span class="nav-icon">📂</span>
        <span class="nav-label">Papkalar</span>
      </button>
    </nav>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
